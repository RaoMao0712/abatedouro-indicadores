{% extends "base.html" %}
{% block conteudo %}
<div class="expedicao-page">
    <section class="card expedicao-cabecalho-compacto">
        <div><span class="eyebrow">Expedição</span><h2>Novo romaneio</h2></div>
        <a href="{{ url_for('expedicao') }}" class="botao-secundario">Voltar</a>
    </section>
    <section class="card">
        <form method="POST" class="form-grid">
            <div><label>Data</label><input type="date" name="data" value="{{ hoje }}" required></div>
            <div>
                <label>Tipo</label>
                <select name="tipo_movimentacao" required>
                    {% for codigo, descricao in tipos_romaneio.items() %}
                    <option value="{{ codigo }}">{{ descricao }}</option>
                    {% endfor %}
                </select>
            </div>
            <div><label>Origem</label><input name="origem" value="Abatedouro" required></div>
            <div><label>Destino</label><input name="destino" value="Câmara Fria LSM" required></div>
            <div><label>Responsável</label><input name="responsavel" placeholder="Nome do responsável"></div>
            <div style="grid-column:1/-1"><label>Observações</label><textarea name="observacoes" rows="3"></textarea></div>
            <div style="grid-column:1/-1"><button type="submit">Criar romaneio</button></div>
        </form>
    </section>
</div>
{% endblock %}
