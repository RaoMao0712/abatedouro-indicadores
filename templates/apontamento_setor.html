{% extends "base.html" %}

{% block conteudo %}
<div class="card">
    <h2>Apontamento por Setor</h2>

    <form method="POST">

        <div class="ficha">
            <h3>1. Ordem e setor</h3>

            <div class="form-grid">
                <div>
                    <label>Ordem de Produção</label>
                    <select name="op_id" required>
                        <option value="">Selecione uma OP</option>
                        {% for op in ordens %}
                            <option value="{{ op.id }}">
                                OP #{{ op.id }} - {{ op.data }} - {{ op.fornecedor }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label>Data</label>
                    <input type="date" name="data" value="{{ hoje }}" required>
                </div>

                <div>
                    <label>Setor</label>
                    <select name="setor" required>
                        <option value="">Selecione</option>
                        {% for setor in setores %}
                            <option value="{{ setor }}">{{ setor }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <div class="ficha">
            <h3>2. Equipe e jornada</h3>

            <div class="form-grid">
                <div>
                    <label>Colaboradores disponíveis</label>
                    <input type="number" name="colaboradores" required>
                </div>

                <div>
                    <label>Hora início</label>
                    <input type="time" name="hora_inicio" required>
                </div>

                <div>
                    <label>Hora fim</label>
                    <input type="time" name="hora_fim" required>
                </div>

                <div>
                    <label>Horas paradas</label>
                    <input type="number" step="0.01" name="horas_paradas" value="0">
                </div>

                <div>
                    <label>Motivo da parada</label>
                    <input type="text" name="motivo_parada">
                </div>
            </div>
        </div>

        <div class="ficha">
            <h3>3. Produção, perdas e qualidade</h3>

            <div class="form-grid">
                <div>
                    <label>Quantidade produzida</label>
                    <input type="number" step="0.01" name="quantidade_produzida" required>
                </div>

                <div>
                    <label>Unidade</label>
                    <select name="unidade" required>
                        <option value="aves">Aves</option>
                        <option value="kg">Kg</option>
                        <option value="bandejas">Bandejas</option>
                        <option value="caixas">Caixas</option>
                    </select>
                </div>

                <div>
                    <label>Condenações</label>
                    <input type="number" step="0.01" name="condenacoes" value="0">
                </div>

                <div>
                    <label>Perdas</label>
                    <input type="number" step="0.01" name="perdas" value="0">
                </div>
            </div>
        </div>

        <div class="ficha">
            <h3>4. Observações</h3>

            <label>Observações</label>
            <input type="text" name="observacoes">
        </div>

        <button type="submit">Salvar apontamento</button>
    </form>
</div>
{% endblock %}
