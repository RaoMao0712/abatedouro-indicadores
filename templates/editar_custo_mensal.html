{% extends "base.html" %}

{% block conteudo %}

<div class="card">
    <h2>Editar Custo Mensal</h2>

    <form method="POST">
        <div class="form-grid">
            <div>
                <label>Competência</label>
                <input
                    type="month"
                    name="competencia"
                    value="{{ custo.competencia }}"
                    required
                >
            </div>

            <div>
                <label>Categoria</label>
                <select name="categoria" required>
                    {% for categoria in categorias_custos %}
                    <option
                        value="{{ categoria }}"
                        {% if custo.categoria == categoria %}selected{% endif %}
                    >
                        {{ categoria }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label>Valor (R$)</label>
                <input
                    type="number"
                    step="0.01"
                    name="valor"
                    value="{{ custo.valor }}"
                    required
                >
            </div>

            <div>
                <label>Observações</label>
                <input
                    type="text"
                    name="observacoes"
                    value="{{ custo.observacoes or '' }}"
                >
            </div>
        </div>

        <button type="submit">Salvar Alterações</button>

        <a href="{{ url_for('custos') }}" class="botao-editar">
            Voltar
        </a>
    </form>
</div>

{% endblock %}
