{% extends "base.html" %}

{% block conteudo %}

{% set lista_setores = [
    "Recepção e Pendura",
    "Escalda e Depenagem",
    "Evisceração",
    "Corte",
    "Embalagem",
    "Expedição"
] %}

<div class="card">
    <h2>Apontamento de Produção</h2>
    <p class="obs">Registre a quantidade produzida por OP e setor.</p>
</div>

<div class="card ficha">
    <h3>Produção</h3>

    <form method="POST">
        <input type="hidden" name="tipo_apontamento" value="producao">

        <div class="form-grid">
            <div>
                <label>OP</label>
                <select name="op_id" required>
                    {% for op in ordens %}
                    <option value="{{ op.id }}">OP {{ op.id }} | {{ op.fornecedor }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label>Data</label>
                <input type="date" name="data" value="{{ hoje }}" required>
            </div>

            <div>
                <label>Setor</label>
                <select name="setor" required>
                    {% for setor in lista_setores %}
                    <option value="{{ setor }}">{{ setor }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label>Quantidade Produzida</label>
                <input type="number" step="0.01" name="quantidade" required>
            </div>

            <div>
                <label>Unidade</label>
                <select name="unidade" required>
                    <option value="kg">kg</option>
                    <option value="aves">aves</option>
                    <option value="unidades">unidades</option>
                </select>
            </div>

            <div>
                <label>Observações</label>
                <input type="text" name="observacoes">
            </div>
        </div>

        <button type="submit">Salvar Produção</button>
    </form>
</div>

{% endblock %}
