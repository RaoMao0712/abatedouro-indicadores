{% extends "base.html" %}

{% block conteudo %}

<div class="card">
    <h2>Editar Ordem de Produção</h2>

    <form method="POST">

        <div class="form-grid">

            <div>
                <label>Data</label>
                <input type="date" name="data" value="{{ op.data }}" required>
            </div>

            <div>
                <label>SKU / Processo produtivo</label>
                <select name="sku" required>
                    <option value="Galinha Inteira" {% if op.sku == "Galinha Inteira" %}selected{% endif %}>
                        Galinha Inteira
                    </option>
                    <option value="Galinha Cortada" {% if op.sku == "Galinha Cortada" or not op.sku %}selected{% endif %}>
                        Galinha Cortada
                    </option>
                </select>
            </div>

            <div>
                <label>Fornecedor</label>
                <select name="fornecedor" required>
                    <option value="">Selecione</option>
                    {% for fornecedor in fornecedores %}
                    <option
                        value="{{ fornecedor.nome }}"
                        {% if fornecedor.nome == op.fornecedor %}selected{% endif %}
                    >
                        {{ fornecedor.nome }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label>GTA</label>
                <input type="text" name="gta" value="{{ op.gta }}">
            </div>

            <div>
                <label>Nota Fiscal</label>
                <input type="text" name="nota_fiscal" value="{{ op.nota_fiscal }}">
            </div>

            <div>
                <label>Aves recebidas</label>
                <input type="number" name="quantidade_aves" value="{{ op.quantidade_aves }}" required>
            </div>

            <div>
                <label>Mortes antes da pendura</label>
                <input type="number" name="mortes_antes_pendura" value="{{ op.mortes_antes_pendura }}">
            </div>

            <div>
                <label>Peso vivo (kg)</label>
                <input type="number" step="0.01" name="peso_vivo" value="{{ op.peso_vivo }}" required>
            </div>

        </div>

        <label>Observações</label>
        <input type="text" name="observacoes" value="{{ op.observacoes or '' }}">

        <button type="submit">
            Salvar alterações
        </button>

    </form>
</div>

{% endblock %}
